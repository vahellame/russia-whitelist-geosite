name: build

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install domain-list-community
        run: go install github.com/v2fly/domain-list-community@latest

      - name: Build geosite.dat
        run: domain-list-community -datapath ./data -outputname geosite.dat -outputdir ./output

      - name: Checksum
        working-directory: output
        run: sha256sum geosite.dat | tee geosite.dat.sha256sum

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: geosite (latest)
          body: "Built from data/ · commit ${{ github.sha }} · run ${{ github.run_number }}"
          make_latest: true
          files: |
            output/geosite.dat
            output/geosite.dat.sha256sum